server:
  port: 8080
  error:
    include-message: always

spring:
  application:
    name: tax-engine

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/taxengine}
    username: ${DB_USER:taxuser}
    password: ${DB_PASS:taxpass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  cache:
    type: redis
    redis:
      time-to-live: 3600000  # 1 hour in ms

security:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}  # 24 hours

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  info:
    title: Tax Calculation Engine API
    description: REST API for Brazilian ISS Municipal Tax Calculation
    version: 1.0.0

logging:
  level:
    com.taxengine: INFO
    org.springframework.security: WARN
